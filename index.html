<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NuroVed Project Structure</title>
<style>
:root {
  --vscode-bg: #1e1e1e;
  --vscode-sidebar: #252526;
  --vscode-hover: #2a2d2e;
  --vscode-selection: #37373d;
  --vscode-text: #cccccc;
  --vscode-text-bright: #ffffff;
  --vscode-folder: #e8a87c;
  --vscode-file: #519aba;
  --vscode-border: #333333;
  --vscode-accent: #007acc;
  --fe-color: #4fc3f7;
  --be-color: #81c784;
  --new-color: #ffd54f;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
  background-color: var(--vscode-bg);
  color: var(--vscode-text);
  display: flex;
  height: 100vh;
  overflow: hidden;
}

/* Sidebar / Tree Area */
.sidebar {
  width: 100%;
  max-width: 450px;
  background-color: var(--vscode-sidebar);
  border-right: 1px solid var(--vscode-border);
  display: flex;
  flex-direction: column;
}

.header {
  padding: 20px 24px;
  border-bottom: 1px solid var(--vscode-border);
}

.header h1 {
  font-size: 16px;
  font-weight: 600;
  color: var(--vscode-text-bright);
  letter-spacing: 0.5px;
}

.header p {
  font-size: 11px;
  color: #858585;
  margin-top: 6px;
  text-transform: uppercase;
}

/* Controls */
.filters {
  display: flex;
  gap: 4px;
  padding: 12px 24px;
  background: var(--vscode-sidebar);
}

.filter-btn {
  font-size: 11px;
  padding: 4px 10px;
  border-radius: 3px;
  border: 1px solid var(--vscode-border);
  background: var(--vscode-bg);
  color: var(--vscode-text);
  cursor: pointer;
  transition: 0.2s;
}

.filter-btn.active {
  background: var(--vscode-accent);
  color: white;
  border-color: transparent;
}

.filter-btn:hover:not(.active) {
  background: var(--vscode-hover);
}

/* Legend */
.legend {
  display: flex;
  gap: 15px;
  padding: 0 24px 12px;
  font-size: 10px;
  border-bottom: 1px solid var(--vscode-border);
}

.legend-item { display: flex; align-items: center; gap: 6px; color: #858585; }
.dot { width: 6px; height: 6px; border-radius: 50%; }

/* The Tree */
.tree-container {
  flex: 1;
  overflow-y: auto;
  padding: 10px 0;
}

ul { list-style: none; }
.children { display: none; }
.children.open { display: block; }

.node-row {
  display: flex;
  align-items: center;
  padding: 4px 24px;
  cursor: pointer;
  white-space: nowrap;
  font-size: 13px;
  border-left: 3px solid transparent;
}

.node-row:hover {
  background-color: var(--vscode-hover);
}

.node-row.selected {
  background-color: var(--vscode-selection);
  border-left-color: var(--vscode-accent);
}

.chevron {
  width: 16px;
  font-size: 10px;
  transition: transform 0.2s;
  color: #858585;
  margin-right: 4px;
  display: inline-block;
  text-align: center;
}

.chevron.expanded { transform: rotate(90deg); }

.icon {
  margin-right: 8px;
  font-size: 14px;
  width: 18px;
  text-align: center;
}

.folder-icon { color: var(--vscode-folder); }
.file-icon { color: var(--vscode-file); }

.label { flex: 1; }

.badge {
  font-size: 9px;
  padding: 1px 5px;
  border-radius: 2px;
  margin-left: 8px;
  font-weight: bold;
}

.badge-fe { background: #035a85; color: #b3e5fc; }
.badge-be { background: #2e7d32; color: #c8e6c9; }
.badge-new { background: #9e7e00; color: #fff9c4; }

/* Detail Panel */
.detail-panel {
  flex: 1;
  background-color: var(--vscode-bg);
  padding: 40px;
  display: none;
  flex-direction: column;
}

.detail-panel.open { display: flex; }

.detail-panel h3 {
  font-size: 24px;
  color: var(--vscode-text-bright);
  margin-bottom: 10px;
}

.path-text {
  font-family: 'Courier New', Courier, monospace;
  font-size: 13px;
  color: var(--vscode-accent);
  margin-bottom: 30px;
}

.desc-text {
  font-size: 15px;
  line-height: 1.6;
  max-width: 600px;
  color: #aaaaaa;
}

.tag-container { margin-top: 20px; display: flex; gap: 8px; }
.tag {
  background: var(--vscode-selection);
  padding: 4px 10px;
  border-radius: 4px;
  font-size: 11px;
}
</style>
</head>
<body>

<div class="sidebar">
  <div class="header">
    <h1>🌿 NUROVED PATIENT APP</h1>
    <p>Flutter · Supabase · Clean Architecture</p>
  </div>

  <div class="filters">
    <button class="filter-btn active" onclick="setFilter('all',this)">All Files</button>
    <button class="filter-btn" onclick="setFilter('frontend',this)">Frontend</button>
    <button class="filter-btn" onclick="setFilter('backend',this)">Backend</button>
    <button class="filter-btn" onclick="setFilter('new',this)">Recently Added</button>
  </div>

  <div class="legend">
    <div class="legend-item"><div class="dot" style="background:var(--fe-color)"></div> Frontend</div>
    <div class="legend-item"><div class="dot" style="background:var(--be-color)"></div> Backend</div>
    <div class="legend-item"><div class="dot" style="background:var(--new-color)"></div> Modified</div>
  </div>

  <div class="tree-container" id="tree-root"></div>
</div>

<div class="detail-panel" id="detail-view">
  <h3 id="d-name">Select a file</h3>
  <div class="path-text" id="d-path">To view its documentation and role</div>
  <div class="desc-text" id="d-desc"></div>
  <div class="tag-container" id="d-tags"></div>
</div>

<script>
// Data remains unchanged as per request
const TREE = [
  {n:"NUROVED",t:"folder",r:"all",children:[
    {n:"android",t:"folder",r:"all",desc:"Flutter Android platform target. Do not modify for business logic.",tags:["Platform"]},
    {n:"ios",t:"folder",r:"all",desc:"Flutter iOS platform target. Do not modify for business logic.",tags:["Platform"]},
    {n:"web",t:"folder",r:"all",desc:"Flutter Web target (PWA support).",tags:["Platform"]},
    {n:"assets",t:"folder",r:"all",children:[
      {n:"images",t:"folder",r:"all",desc:"App illustrations, onboarding images."},
      {n:"icons",t:"folder",r:"all",desc:"SVG/PNG icons."},
      {n:"lottie",t:"folder",r:"all",isNew:true,desc:"Lottie animations for success states.",tags:["New"]},
    ]},
    {n:"supabase",t:"folder",r:"backend",children:[
      {n:"functions",t:"folder",r:"backend",children:[
        {n:"analyze_report.ts",t:"file",r:"backend",desc:"AI-powered lab report parsing via OpenAI/Gemini."},
        {n:"generate_diet.ts",t:"file",r:"backend",desc:"Generates personalised diet plans."},
      ]},
      {n:"migrations",t:"folder",r:"backend",desc:"SQL migration files for database schema."},
    ]},
    {n:"lib",t:"folder",r:"all",children:[
      {n:"main.dart",t:"file",r:"all",desc:"App entry point. Initialises services."},
      {n:"core",t:"folder",r:"all",children:[
        {n:"services",t:"folder",r:"backend",children:[
            {n:"auth_service.dart",t:"file",r:"backend",desc:"Supabase Auth wrapper."},
            {n:"notification_service.dart",t:"file",r:"backend",desc:"FCM/APNs handler."},
        ]}
      ]},
      {n:"features",t:"folder",r:"frontend",children:[
        {n:"auth",t:"folder",r:"frontend",children:[
            {n:"login_screen.dart",t:"file",r:"frontend",desc:"UI for user login."},
            {n:"signup_screen.dart",t:"file",r:"frontend",desc:"UI for user registration."}
        ]},
        {n:"nutrition",t:"folder",r:"frontend",isNew:true,children:[
            {n:"nutrition_screen.dart",t:"file",r:"frontend",isNew:true,desc:"Daily macro and meal tracker."},
        ]}
      ]}
    ]}
  ]}
];

// Reference for details
const fileDetails = {};

function createNode(node, depth = 0) {
  const container = document.createElement('div');
  const path = node.n; 

  const row = document.createElement('div');
  row.className = 'node-row';
  row.style.paddingLeft = (depth * 15 + 24) + 'px';
  row.dataset.role = node.r;
  row.dataset.isNew = node.isNew || false;

  // Chevron for folders
  if (node.children) {
    const chev = document.createElement('span');
    chev.className = 'chevron';
    chev.innerHTML = '▶';
    row.appendChild(chev);
  } else {
    const spacer = document.createElement('span');
    spacer.className = 'chevron';
    row.appendChild(spacer);
  }

  // Icon
  const icon = document.createElement('span');
  icon.className = 'icon ' + (node.t === 'folder' ? 'folder-icon' : 'file-icon');
  icon.innerHTML = node.t === 'folder' ? '📂' : '📄';
  row.appendChild(icon);

  // Label
  const label = document.createElement('span');
  label.className = 'label';
  label.textContent = node.n;
  row.appendChild(label);

  // Badges
  if (node.isNew) {
    const b = document.createElement('span');
    b.className = 'badge badge-new';
    b.textContent = 'NEW';
    row.appendChild(b);
  } else if (node.r === 'frontend') {
    const b = document.createElement('span');
    b.className = 'badge badge-fe';
    b.textContent = 'FE';
    row.appendChild(b);
  } else if (node.r === 'backend') {
    const b = document.createElement('span');
    b.className = 'badge badge-be';
    b.textContent = 'BE';
    row.appendChild(b);
  }

  container.appendChild(row);

  // Children handling
  if (node.children) {
    const childGroup = document.createElement('div');
    childGroup.className = 'children';
    node.children.forEach(child => {
      childGroup.appendChild(createNode(child, depth + 1));
    });
    container.appendChild(childGroup);

    row.onclick = (e) => {
      e.stopPropagation();
      const isOpening = !childGroup.classList.contains('open');
      childGroup.classList.toggle('open');
      row.querySelector('.chevron').classList.toggle('expanded', isOpening);
      row.querySelector('.icon').innerHTML = isOpening ? '📂' : '📁';
      selectRow(row, node, path);
    };
  } else {
    row.onclick = (e) => {
      e.stopPropagation();
      selectRow(row, node, path);
    };
  }

  return container;
}

function selectRow(row, node, path) {
  document.querySelectorAll('.node-row').forEach(r => r.classList.remove('selected'));
  row.classList.add('selected');

  if (!node.children) {
    document.getElementById('detail-view').classList.add('open');
    document.getElementById('d-name').textContent = node.n;
    document.getElementById('d-path').textContent = "project_root / " + node.n;
    document.getElementById('d-desc').textContent = node.desc || "No documentation available for this file.";
    
    const tags = document.getElementById('d-tags');
    tags.innerHTML = '';
    if (node.tags) {
      node.tags.forEach(t => {
        const span = document.createElement('span');
        span.className = 'tag';
        span.textContent = t;
        tags.appendChild(span);
      });
    }
  }
}

function setFilter(mode, btn) {
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');

  document.querySelectorAll('.node-row').forEach(row => {
    const role = row.dataset.role;
    const isNew = row.dataset.isNew === 'true';

    if (mode === 'all') row.parentElement.style.display = 'block';
    else if (mode === 'frontend') row.parentElement.style.display = (role === 'frontend' || role === 'all') ? 'block' : 'none';
    else if (mode === 'backend') row.parentElement.style.display = (role === 'backend' || role === 'all') ? 'block' : 'none';
    else if (mode === 'new') row.parentElement.style.display = isNew ? 'block' : 'none';
  });
}

// Initial Build
const root = document.getElementById('tree-root');
TREE.forEach(node => root.appendChild(createNode(node)));
</script>
</body>
</html>
